<!DOCTYPE html>
<html>

<head>
    <title>Register Account</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #21344a 0%, #2f4d72 100%);
            margin: 0;
            color: white;
        }

        .register-container {
            max-width: 460px;
            margin: 90px auto;
            padding: 28px;
            background: rgba(20, 33, 48, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24);
            backdrop-filter: blur(6px);
        }

        .dashboard-company {
            font-size: 13px;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.65);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .page-title {
            margin: 0;
            font-size: 30px;
            font-weight: bold;
        }

        .page-subtitle {
            margin: 8px 0 22px 0;
            color: #c9d5e2;
            font-size: 14px;
        }

        .message-box,
        .error-box {
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .message-box {
            color: #c8f7d2;
            background: rgba(39, 174, 96, 0.20);
            border: 1px solid rgba(39, 174, 96, 0.35);
        }

        .error-box {
            color: #ffd8dd;
            background: rgba(176, 42, 55, 0.22);
            border: 1px solid rgba(241, 174, 181, 0.45);
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            font-weight: bold;
            color: #dce7f2;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 10px;
            font-size: 14px;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.10);
            color: #ffffff;
            outline: none;
        }

        input:focus {
            border-color: #5bb5ff;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.18);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .primary-btn,
        .secondary-link {
            padding: 11px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
        }

        .primary-btn {
            border: none;
            background-color: #3498db;
            color: white;
        }

        .primary-btn:hover {
            background-color: #2387cf;
        }

        .secondary-link {
            background-color: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.10);
        }

        .secondary-link:hover {
            background-color: rgba(255, 255, 255, 0.14);
        }

        .page-footer-label {
            text-align: center;
            margin-top: 16px;
            color: #c9d5e2;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .password-wrap {
            position: relative;
        }

        .password-wrap input {
            padding-right: 52px;
        }

        .system-name-top-right {
            position: absolute;
            top: 50px;
            right: 450px;
            font-family: "Segoe UI", Arial, sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #9fb7d1;
        }

        .toggle-password-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #c9d5e2;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            padding: 0;
        }

        .toggle-password-btn:hover {
            color: white;
        }

        .bottom-right-text {
            position: absolute;
            bottom: -45px;
            right: 15px;
            pointer-events: none;
            z-index: 9999;
            font-family: "Segoe UI", Arial, sans-serif;
            font-size: 10px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
        }

        @media (max-width: 768px) {
            .page-container {
                padding: 0 14px;
            }

            .page-title {
                font-size: 26px;
            }

            .system-name-top-right,
            .bottom-right-text {
                position: static;
                display: block;
                margin-bottom: 12px;
                text-align: right;
            }
        }
    </style>
</head>

<body>

    <body>

        <div class="system-name-top-right">
            Q-TWO (M) SDN BHD FREIGHT FORWARDING SYSTEM
        </div>

        <div class="register-container">
            <h1 class="page-title">Register Account</h1>
            <p class="page-subtitle">Submit a new account request for admin approval.</p>

            {% if error %}
            <div class="error-box">{{ error }}</div>
            {% endif %}

            {% if success_message %}
            <div class="message-box">{{ success_message }}</div>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrap">
                        <input type="password" name="password" id="passwordField" required>
                        <button type="button" class="toggle-password-btn"
                            onclick="togglePassword('passwordField', this)">Show</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="password-wrap">
                        <input type="password" name="confirm_password" id="confirmPasswordField" required>
                        <button type="button" class="toggle-password-btn"
                            onclick="togglePassword('confirmPasswordField', this)">Show</button>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="primary-btn">Submit Request</button>
                    <a href="/login" class="secondary-link">Back to Login</a>
                </div>
            </form>
            <div class="bottom-right-text">© 2026 by Freelance Generation</div>
        </div>

        <script>
            function togglePassword(fieldId, button) {
                const field = document.getElementById(fieldId);

                if (field.type === "password") {
                    field.type = "text";
                    button.textContent = "Hide";
                } else {
                    field.type = "password";
                    button.textContent = "Show";
                }
            }
        </script>

    </body>

</html>
